<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Canvas WASD + Animazione</title>
    
    <style>
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;

          background-color: black;
        }
        
        canvas {
          display: block;
          background-color: #ffffff;

        }
        #selezionato {
          white-space: pre-line;
          
          position: absolute;
          left: 200px;
          top: 80px;
          color: blue;
          font-size: 20px;
        }
        #spunta {
          white-space: pre-line;
          position: absolute;
          font-size: 20px;
          color: red;
          left: 600px;
          top: 20px;
          
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="500"></canvas>
<p id="selezionato">0</p>
<p id="spunta"></p>
